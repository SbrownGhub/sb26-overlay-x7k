<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Speed Build — CCTV Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --red:#CC0000; --ink:#FFFFFF; }
  html, body {
    margin:0; padding:0; background:transparent; overflow:hidden;
    width:1920px; height:1080px; color:var(--ink);
    font-family:'Roboto Mono',ui-monospace,monospace;
    -webkit-font-smoothing:antialiased;
  }
  .hide { display:none !important; }

  /* Everything sits on a hard shadow so it reads over any footage,
     the way real camera burn-in does. */
  .burn { text-shadow:0 2px 0 rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.85), 0 0 3px rgba(0,0,0,1); }

  /* ---------------- picture treatment ---------------- */
  #tint { position:fixed; inset:0; pointer-events:none; }
  #tint.on { background:rgba(120,140,150,.10); mix-blend-mode:saturation; }

  #vignette {
    position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 42%, rgba(0,0,0,.35) 82%, rgba(0,0,0,.62) 100%);
  }

  #scan {
    position:fixed; inset:0; pointer-events:none;
    background:repeating-linear-gradient(to bottom,
      rgba(0,0,0,.16) 0 1px, transparent 1px 3px);
  }

  /* a slow bright band drifting down the frame — the tell of a cheap sensor */
  #roll {
    position:fixed; left:0; right:0; height:170px; pointer-events:none;
    background:linear-gradient(to bottom, transparent, rgba(255,255,255,.045) 45%, transparent);
    animation:roll 7s linear infinite;
  }
  @keyframes roll { from { top:-180px; } to { top:1080px; } }

  #noise {
    position:fixed; inset:0; pointer-events:none; opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.6'/></svg>");
    animation:grain .5s steps(3) infinite;
  }
  @keyframes grain {
    0%{transform:translate(0,0)} 33%{transform:translate(-3px,2px)} 66%{transform:translate(2px,-2px)} 100%{transform:translate(0,0)}
  }

  /* interference — fires at random intervals, not on a loop */
  #tear {
    position:fixed; left:0; right:0; pointer-events:none; opacity:0;
    background:rgba(255,255,255,.14);
    border-top:1px solid rgba(255,255,255,.28);
    border-bottom:1px solid rgba(0,0,0,.5);
  }
  #tear.go { animation:tear .34s steps(4) forwards; }
  @keyframes tear {
    0%{opacity:0; transform:translateX(0)}
    20%{opacity:1; transform:translateX(-26px)}
    45%{opacity:1; transform:translateX(18px)}
    70%{opacity:1; transform:translateX(-9px)}
    100%{opacity:0; transform:translateX(0)}
  }
  #dropout { position:fixed; inset:0; background:#000; opacity:0; pointer-events:none; }
  #dropout.go { animation:drop .18s steps(2) forwards; }
  @keyframes drop { 0%{opacity:0} 40%{opacity:.85} 100%{opacity:0} }

  /* ---------------- framing ---------------- */
  .bracket { position:fixed; pointer-events:none; }
  .bracket i { position:absolute; background:rgba(255,255,255,.75); }
  .b-h { width:52px; height:2px; } .b-v { width:2px; height:52px; }

  #reticle { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
  #reticle i { position:absolute; background:rgba(255,255,255,.5); }

  /* ---------------- furniture ---------------- */
  #rec { position:fixed; top:52px; left:64px; display:flex; align-items:center; gap:14px; }
  #dot { width:20px; height:20px; border-radius:50%; background:var(--red);
         box-shadow:0 0 14px rgba(204,0,0,.9); animation:blink 1.1s steps(2) infinite; }
  @keyframes blink { 0%,55%{opacity:1} 56%,100%{opacity:.12} }
  #rec-txt { font-size:27px; font-weight:700; letter-spacing:.34em; }

  #cam { position:fixed; top:100px; left:64px; font-size:21px; letter-spacing:.26em; color:rgba(255,255,255,.9); }

  #stamp { position:fixed; top:52px; right:64px; text-align:right; }
  #date { font-size:23px; letter-spacing:.2em; color:rgba(255,255,255,.9); }
  #time { font-size:40px; font-weight:700; letter-spacing:.12em; font-variant-numeric:tabular-nums; margin-top:5px; }
  #time .ms { font-size:23px; opacity:.65; }

  #brand { position:fixed; bottom:56px; left:64px; }
  #brand .b1 { font-size:19px; letter-spacing:.34em; color:var(--red); font-weight:700; }
  #brand .b2 { font-size:31px; letter-spacing:.2em; font-weight:700; margin-top:8px; }

  #meta { position:fixed; bottom:56px; right:64px; text-align:right; font-size:18px;
          letter-spacing:.2em; color:rgba(255,255,255,.85); line-height:1.85; }
  #bars { display:inline-flex; align-items:flex-end; gap:3px; margin-left:10px; vertical-align:-2px; }
  #bars i { width:5px; background:rgba(255,255,255,.9); }

  #status { position:fixed; bottom:16px; left:18px; font-size:10px; color:rgba(255,255,255,.22); letter-spacing:.14em; }
</style>
</head>
<body>

  <div id="tint"></div>
  <div id="scan"></div>
  <div id="roll"></div>
  <div id="noise"></div>
  <div id="vignette"></div>
  <div id="tear"></div>
  <div id="dropout"></div>

  <div class="bracket" style="top:34px;left:34px"><i class="b-h"></i><i class="b-v"></i></div>
  <div class="bracket" style="top:34px;right:34px"><i class="b-h" style="right:0"></i><i class="b-v" style="right:0"></i></div>
  <div class="bracket" style="bottom:34px;left:34px"><i class="b-h" style="bottom:0"></i><i class="b-v" style="bottom:0"></i></div>
  <div class="bracket" style="bottom:34px;right:34px"><i class="b-h" style="bottom:0;right:0"></i><i class="b-v" style="bottom:0;right:0"></i></div>

  <div id="reticle" class="hide">
    <i style="left:-30px;top:-1px;width:22px;height:2px"></i>
    <i style="right:-30px;top:-1px;width:22px;height:2px"></i>
    <i style="top:-30px;left:-1px;height:22px;width:2px"></i>
    <i style="bottom:-30px;left:-1px;height:22px;width:2px"></i>
  </div>

  <div id="rec" class="burn"><div id="dot"></div><div id="rec-txt">REC</div></div>
  <div id="cam" class="burn">CAM 01</div>

  <div id="stamp" class="burn">
    <div id="date">--/--/----</div>
    <div id="time">--:--:--</div>
  </div>

  <div id="brand" class="burn">
    <div class="b1">BUREAU // SB2026</div>
    <div class="b2" id="room">\u2014</div>
  </div>

  <div id="meta" class="burn">
    <div>SIGNAL<span id="bars"></span></div>
    <div id="fps">30 FPS &nbsp;\u00b7&nbsp; 1080P</div>
    <div id="frames">FRM 000000</div>
  </div>

  <div id="status">standalone</div>

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<script>
  /* ============ CONFIG — must match control ============ */
  var ABLY_API_KEY = 'tBw4fw.80_qjg:lyIY2luq1ef0IESrQLekGmz7FJgbSCp0gcLtpfDqcS8';
  var CHANNEL_NAME = 'speedbuild-v4';
  /* ====================================================

     URL options, all optional:
       ?cam=03          camera number shown top left
       ?label=ROOFTOP   fixed room name instead of the live one
       ?tint=0          turn off the desaturating wash
       ?noise=0         turn off grain
       ?reticle=1       centre crosshair
       ?glitch=0        no interference
       ?clean=1         furniture only, no picture treatment
  */

  var $ = function (id) { return document.getElementById(id); };
  var P = new URLSearchParams(location.search);
  var opt = function (k, d) { var v = P.get(k); return v === null ? d : v !== '0'; };

  var CLEAN = opt('clean', false);
  if (opt('tint', true) && !CLEAN) $('tint').classList.add('on');
  if (!opt('noise', true) || CLEAN) $('noise').classList.add('hide');
  if (CLEAN) { $('scan').classList.add('hide'); $('roll').classList.add('hide'); $('vignette').classList.add('hide'); }
  if (opt('reticle', false)) $('reticle').classList.remove('hide');

  $('cam').textContent = 'CAM ' + (P.get('cam') || '01');
  var FIXED_LABEL = P.get('label');
  if (FIXED_LABEL) $('room').textContent = FIXED_LABEL.toUpperCase();

  /* ---------------- clock ---------------- */
  var pad = function (n, w) { return String(n).padStart(w || 2, '0'); };
  function clock() {
    var d = new Date();
    $('date').textContent = pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + d.getFullYear();
    $('time').innerHTML = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()) +
      '<span class="ms">.' + pad(Math.floor(d.getMilliseconds() / 10)) + '</span>';
  }
  setInterval(clock, 50);
  clock();

  /* ---------------- frame counter ---------------- */
  var frame = Math.floor(Math.random() * 400000);
  /* 100ms, not 33ms. Nobody reads the individual frames, and this may be
     running on four browser sources at once for eight hours. */
  setInterval(function () {
    frame = (frame + 3) % 1000000;
    $('frames').textContent = 'FRM ' + pad(frame, 6);
  }, 100);

  /* ---------------- signal bars ---------------- */
  var barsEl = $('bars');
  for (var i = 0; i < 4; i++) {
    var b = document.createElement('i');
    b.style.height = (7 + i * 4) + 'px';
    barsEl.appendChild(b);
  }
  /* drift between three and four bars so it never looks static */
  setInterval(function () {
    var strength = Math.random() < 0.82 ? 4 : 3;
    [].forEach.call(barsEl.children, function (el, idx) {
      el.style.opacity = idx < strength ? '0.9' : '0.22';
    });
  }, 2600);

  /* ---------------- interference ---------------- */
  function glitch() {
    if (!opt('glitch', true) || CLEAN) return schedule();
    var t = $('tear');
    t.style.top = Math.floor(Math.random() * 900) + 'px';
    t.style.height = (6 + Math.floor(Math.random() * 46)) + 'px';
    t.classList.remove('go'); void t.offsetWidth; t.classList.add('go');

    /* occasionally the whole frame drops for a beat */
    if (Math.random() < 0.22) {
      var d = $('dropout');
      d.classList.remove('go'); void d.offsetWidth; d.classList.add('go');
    }
    schedule();
  }
  function schedule() { setTimeout(glitch, 6000 + Math.random() * 15000); }
  schedule();

  /* ---------------- live room name ---------------- */
  /* Works standalone. If control is on air, the room name follows it. */
  try {
    var ably = new Ably.Realtime(ABLY_API_KEY);
    var channel = ably.channels.get(CHANNEL_NAME, { params: { rewind: '5' } });
    ably.connection.on('connected', function () { $('status').textContent = 'live'; });
    ably.connection.on('disconnected', function () { $('status').textContent = 'reconnecting'; });
    var lastRev = -1;
    channel.subscribe('state', function (msg) {
      try {
        if (FIXED_LABEL) return;
        var d = msg.data || {};
        if (typeof d.rev === 'number' && d.rev < lastRev) return;  /* stale panel guard */
        if (typeof d.rev === 'number') lastRev = d.rev;
        if (d.roomName) $('room').textContent = String(d.roomName).toUpperCase();
      } catch (e) {}
    });
  } catch (e) {
    $('status').textContent = 'standalone';
  }
</script>
</body>
</html>
