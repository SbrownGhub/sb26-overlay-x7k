<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Speed Build — Broadcast Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --red:#CC0000; --green:#00D97E; }
  html, body {
    margin:0; padding:0; background:transparent; overflow:hidden;
    width:1920px; height:1080px;
    font-family:'Roboto Mono',ui-monospace,monospace; color:#fff;
    -webkit-font-smoothing:antialiased;
  }
  .hide { display:none !important; }

  /* Solid plates so nothing is lost against a bright shot. */
  .plate { background:#000; padding:10px 18px; display:inline-block; }

  #room-wrap { position:absolute; top:34px; left:44px; }
  #room-name { font-size:22px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; }
  #room-name .k { color:var(--red); }
  #timer-plate { margin-top:8px; padding:10px 18px; }
  #timer { font-size:40px; font-weight:700; font-variant-numeric:tabular-nums; }
  #timer.warn { color:var(--red); animation:tick 1s steps(2) infinite; }

  #rem-wrap { position:absolute; left:44px; }
  #rem-plate { display:inline-flex; align-items:baseline; gap:12px; }
  #rem-num { font-size:30px; font-weight:700; color:var(--red); font-variant-numeric:tabular-nums; }
  #rem-lbl { font-size:12px; letter-spacing:.28em; color:rgba(255,255,255,.85); text-transform:uppercase; }

  #pot-wrap { position:absolute; top:34px; right:44px; text-align:right; }
  #pot-plate { padding:12px 20px 14px; }
  #pot-lbl { font-size:13px; letter-spacing:.34em; font-weight:500; color:var(--red); text-transform:uppercase; }
  #pot { font-size:52px; font-weight:700; margin-top:6px; font-variant-numeric:tabular-nums; }
  #pot .c { font-size:30px; opacity:.72; }
  #pot.hit { animation:potHit .7s ease-out; }
  #paused { margin-top:8px; }
  #paused .box { display:inline-block; background:var(--red); padding:7px 16px; }
  #paused .t { font-size:15px; font-weight:700; letter-spacing:.3em; text-transform:uppercase; animation:tick 1.4s steps(2) infinite; }

  #pen-wrap { position:absolute; right:44px; }
  #pen-wrap.show { animation:penFloat 1.6s ease-out forwards; }
  #pen { font-size:27px; font-weight:700; color:var(--red); font-variant-numeric:tabular-nums; }

  #secret {
    position:absolute; bottom:56px; background:#000; border:3px solid var(--red);
    transition:transform .5s cubic-bezier(.2,.8,.2,1);
  }
  #sec-head { letter-spacing:.34em; color:var(--red); text-transform:uppercase; font-weight:700; }
  #sec-name { font-weight:700; }
  #sec-task { line-height:1.42; }
  #sec-prize-wrap { border-top:2px solid var(--red); }
  #sec-prize-lbl { letter-spacing:.24em; color:rgba(255,255,255,.6); text-transform:uppercase; }
  #sec-prize { font-weight:700; color:var(--green); vertical-align:middle; }

  #moment { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
            flex-direction:column; text-align:center; padding:0 70px; }
  #moment.on { display:flex; }
  #mo-bg { position:absolute; inset:0; }
  #mo-inner { position:relative; }
  #mo-kicker { font-size:38px; letter-spacing:.4em; text-transform:uppercase; font-weight:500; line-height:1.35; }
  #mo-name { font-size:86px; font-weight:700; margin-top:22px; line-height:1; }
  #moment.positive #mo-bg { background:var(--green); animation:slamBg .9s ease-out forwards; }
  #moment.positive #mo-kicker { color:#00301B; }
  #moment.positive #mo-name { color:#000; }
  #moment.positive #mo-inner { animation:slamIn .55s cubic-bezier(.15,1.3,.4,1) both, fadeOut .3s ease-in 1.5s forwards; }
  #moment.negative #mo-bg { background:var(--red); animation:elimBg 3.4s ease-out forwards; }
  #moment.negative #mo-kicker { color:rgba(255,255,255,.85); }
  #moment.negative #mo-name { color:#fff; }
  #moment.negative #mo-inner { animation:elimIn .5s cubic-bezier(.15,1.2,.4,1) both, fadeOut .45s ease-in 2.9s forwards; }

  #cash { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  #cash-wash { position:absolute; inset:0; background:radial-gradient(ellipse at center, transparent 30%, rgba(0,217,126,.13) 75%, rgba(0,217,126,.33) 100%); opacity:0; }
  #cash-wash.on { animation:wash 2.2s ease-out forwards; }
  .bill { position:absolute; top:-120px; font-weight:700; text-shadow:0 0 14px rgba(0,0,0,.85); }

  @keyframes potHit { 0%{color:var(--red);transform:scale(1.06)} 100%{color:#fff;transform:scale(1)} }
  @keyframes penFloat { 0%{opacity:0;transform:translateY(0)} 15%{opacity:1} 100%{opacity:0;transform:translateY(-46px)} }
  @keyframes tick { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes slamBg { 0%{opacity:0} 4%{opacity:1} 72%{opacity:1} 100%{opacity:0} }
  @keyframes slamIn { 0%{transform:scale(2.4);opacity:0} 42%{opacity:1} 100%{transform:scale(1);opacity:1} }
  @keyframes elimBg { 0%{opacity:0} 5%{opacity:1} 82%{opacity:1} 100%{opacity:0} }
  @keyframes elimIn { 0%{transform:translateY(34px);opacity:0} 100%{transform:translateY(0);opacity:1} }
  @keyframes fadeOut { to{opacity:0} }
  @keyframes wash { 0%{opacity:0} 12%{opacity:1} 100%{opacity:0} }
  @keyframes fallA { 0%{transform:translate(0,0) rotate(0);opacity:0} 8%{opacity:1} 88%{opacity:1} 100%{transform:translate(var(--drift),1300px) rotate(var(--spin));opacity:0} }
  @keyframes fallB { 0%{transform:translate(0,0) rotate(0) scale(.7);opacity:0} 10%{opacity:1} 85%{opacity:1} 100%{transform:translate(var(--drift),1300px) rotate(var(--spin)) scale(1.25);opacity:0} }
  @keyframes fallC { 0%{transform:translate(0,0) rotate(0);opacity:0} 6%{opacity:1} 90%{opacity:1} 100%{transform:translate(calc(var(--drift) * -1),1300px) rotate(var(--spin));opacity:0} }

  #status { position:absolute; bottom:14px; left:16px; font-size:10px; color:rgba(255,255,255,.25); letter-spacing:.14em; }
</style>
</head>
<body>

  <div id="room-wrap">
    <div class="plate" id="room-plate"><div id="room-name"><span class="k">ROOM = </span><span id="room-val"></span></div></div>
    <div class="plate hide" id="timer-plate"><div id="timer">--:--</div></div>
  </div>

  <div id="rem-wrap" class="hide">
    <div class="plate" id="rem-plate"><span id="rem-num">--</span><span id="rem-lbl">Remaining</span></div>
  </div>

  <div id="pot-wrap">
    <div class="plate" id="pot-plate">
      <div id="pot-lbl">Prize pot</div>
      <div id="pot">$--,---</div>
    </div>
    <div id="paused" class="hide"><div class="box"><div class="t">Clock paused</div></div></div>
  </div>

  <div id="pen-wrap"><div class="plate" style="padding:8px 16px"><div id="pen"></div></div></div>

  <div id="secret"></div>

  <div id="moment"><div id="mo-bg"></div><div id="mo-inner"><div id="mo-kicker"></div><div id="mo-name"></div></div></div>

  <div id="cash"><div id="cash-wash"></div></div>
  <div id="status">connecting</div>

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<script>
  /* ============ CONFIG — must match control ============ */
  var ABLY_API_KEY = 'tBw4fw.80_qjg:lyIY2luq1ef0IESrQLekGmz7FJgbSCp0gcLtpfDqcS8';
  var CHANNEL_NAME = 'speedbuild-v4';
  var SURFACE = 'stream';
  /* ==================================================== */

  var SIZES = {
    sm: { w:470,  head:13, name:26, task:21, prizeLbl:13, prize:30, pad:'20px 24px 22px', border:2 },
    md: { w:720,  head:17, name:40, task:31, prizeLbl:17, prize:42, pad:'30px 34px 32px', border:3 },
    lg: { w:1000, head:22, name:54, task:41, prizeLbl:21, prize:56, pad:'38px 44px 42px', border:4 }
  };

  var $ = function (id) { return document.getElementById(id); };
  var ably = new Ably.Realtime(ABLY_API_KEY);
  /* rewind=10 — a refreshed overlay recovers the pot and timer immediately,
     because control publishes state last and heartbeats it every ~30s. */
  var channel = ably.channels.get(CHANNEL_NAME, { params: { rewind: '10' } });

  ably.connection.on('connected', function () { $('status').textContent = 'live'; });
  ably.connection.on('disconnected', function () { $('status').textContent = 'reconnecting'; });

  var S = null, tickTimer = null;

  /* Anything missing defaults to visible, so an older or partial state
     message can never blank the broadcast. */
  function on(key) {
    if (!S || !S.vis) return true;
    var v = S.vis[key];
    if (!v) return true;
    return v[SURFACE] !== false;
  }

  function money(v) {
    var n = Math.max(0, v), w = Math.floor(n), c = Math.floor((n - w) * 100);
    return { main: '$' + w.toLocaleString('en-US'), cents: '.' + String(c).padStart(2, '0') };
  }
  function fmtTime(ms) {
    var t = Math.floor(Math.max(0, ms) / 1000);
    return String(Math.floor(t / 60)).padStart(2, '0') + ':' + String(t % 60).padStart(2, '0');
  }
  function currentPot() {
    if (!S) return 0;
    if (!S.potRunning) return S.potBase;
    return S.potBase - ((Date.now() - S.potBaseTime) / 60000) * S.potRatePerMin;
  }
  function show(el, yes) { el.classList.toggle('hide', !yes); }

  function renderSecret() {
    var box = $('secret');
    var live = on('secret') && S && S.secret && S.secret.task;
    var z = SIZES[(S && S.secretSize) || 'md'] || SIZES.md;
    var side = (S && S.secretSide) === 'right' ? 'right' : 'left';

    box.style.width = z.w + 'px';
    box.style.padding = z.pad;
    box.style.borderWidth = z.border + 'px';
    box.style.left = side === 'left' ? '44px' : 'auto';
    box.style.right = side === 'right' ? '44px' : 'auto';
    box.style.transform = live ? 'translateX(0)'
      : (side === 'left' ? 'translateX(-118%)' : 'translateX(118%)');

    if (!live) return;
    var sec = S.secret;
    box.innerHTML =
      '<div id="sec-head" style="font-size:' + z.head + 'px">Secret challenge</div>' +
      '<div id="sec-name" style="font-size:' + z.name + 'px;margin-top:' + z.head + 'px">' + esc(sec.name || '') + '</div>' +
      '<div id="sec-task" style="font-size:' + z.task + 'px;margin-top:' + (z.head - 3) + 'px">' + esc(sec.task) + '</div>' +
      (sec.prize
        ? '<div id="sec-prize-wrap" style="margin-top:' + (z.head + 5) + 'px;padding-top:' + (z.head + 3) + 'px">' +
          '<span id="sec-prize-lbl" style="font-size:' + z.prizeLbl + 'px">Banks </span>' +
          '<span id="sec-prize" style="font-size:' + z.prize + 'px">' + esc(sec.prize) + '</span></div>'
        : '');
  }

  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c];
    });
  }

  function render() {
    if (!S) return;

    var showRoom = on('room');
    show($('room-plate'), showRoom);
    $('room-val').textContent = S.roomName || '';

    var showTimer = on('timer') && S.roundEndTime !== null && S.roundEndTime !== undefined;
    show($('timer-plate'), showTimer);
    if (showTimer) {
      var rem = S.roundEndTime - Date.now();
      $('timer').textContent = fmtTime(rem);
      $('timer').classList.toggle('warn', rem < 5 * 60 * 1000);
    }

    var hasRem = on('remaining') && S.remaining !== null && S.remaining !== undefined;
    show($('rem-wrap'), hasRem);
    if (hasRem) {
      $('rem-num').textContent = S.remaining;
      /* sit under whatever is actually showing above */
      $('rem-wrap').style.top = showTimer ? '152px' : (showRoom ? '96px' : '34px');
    }

    var showPot = on('pot');
    show($('pot-plate'), showPot);
    if (showPot) {
      var m = money(currentPot());
      $('pot').innerHTML = m.main + '<span class="c">' + m.cents + '</span>';
    }

    show($('paused'), on('paused') && !S.potRunning);

    /* penalty sits below whatever the pot column is showing */
    $('pen-wrap').style.top = (showPot ? 186 : 60) + 'px';

    renderSecret();
  }

  function startLoop() {
    if (tickTimer) clearInterval(tickTimer);
    tickTimer = setInterval(render, 100);
  }

  /* ---------- effects ---------- */
  /* No audio here. Stings belong on the sound desk, cued to picture and
     balanced against the room — not fired from a browser source. */
  function retrigger(el, cls) { el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls); }

  function doPenalty(amount) {
    if (!on('penalty')) return;
    if (on('pot')) retrigger($('pot'), 'hit');
    $('pen').textContent = '\u2212$' + Number(amount || 0).toLocaleString('en-US');
    retrigger($('pen-wrap'), 'show');
  }

  var momentTimer = null;
  function doMoment(d) {
    if (!on('moments')) return;
    clearTimeout(momentTimer);
    var el = $('moment');
    el.className = '';
    void el.offsetWidth;
    $('mo-kicker').textContent = d.kicker || '';
    var nameEl = $('mo-name');
    nameEl.textContent = (d.name || '').toUpperCase();
    nameEl.style.display = d.name ? 'block' : 'none';
    var tone = d.tone === 'negative' ? 'negative' : 'positive';
    el.classList.add('on', tone);
    momentTimer = setTimeout(function () { el.className = ''; }, tone === 'positive' ? 2000 : 3500);
  }

  function doCash() {
    if (!on('cash')) return;
    var layer = $('cash');
    retrigger($('cash-wash'), 'on');
    var syms = ['$', '\u00A3', '\u20AC', '$', '$'];
    for (var i = 0; i < 90; i++) {
      var b = document.createElement('div');
      b.className = 'bill';
      b.textContent = syms[i % 5];
      b.style.left = (Math.random() * 104 - 2) + '%';
      b.style.fontSize = (30 + Math.random() * 76) + 'px';
      b.style.color = (i % 4 !== 0) ? 'var(--green)' : '#fff';
      b.style.setProperty('--spin', ((Math.random() < 0.5 ? -1 : 1) * (360 + Math.random() * 900)) + 'deg');
      b.style.setProperty('--drift', ((Math.random() - 0.5) * 340) + 'px');
      var anim = i % 3 === 0 ? 'fallA' : (i % 3 === 1 ? 'fallB' : 'fallC');
      b.style.animation = anim + ' ' + (2.1 + Math.random() * 1.8) + 's cubic-bezier(.35,.05,.6,1) ' + (Math.random() * 1.1) + 's forwards';
      layer.appendChild(b);
      (function (node) { setTimeout(function () { node.remove(); }, 5200); })(b);
    }
  }

  /* ---------- subscriptions ---------- */
  channel.subscribe('state', function (msg) {
    try {
      var d = msg.data;
      if (!d) return;
      /* REVISION GUARD — if a second control panel is holding older state
         and heartbeats it, ignore it. Without this, a stale panel can roll
         the pot, the count and the room name backwards mid-broadcast. */
      if (S && typeof d.rev === 'number' && typeof S.rev === 'number' && d.rev < S.rev) return;
      S = d; render(); startLoop();
    }
    catch (e) { console.warn('state render failed', e); }
  });

  /* Rewind replays recent messages on reconnect. State is absolute and safe
     to replay; effects are moments and must not re-fire. */
  function isLive(msg) { return (Date.now() - msg.timestamp) < 3000; }
  function bind(ev, fn) {
    channel.subscribe(ev, function (m) {
      if (!isLive(m)) return;
      try { fn(m.data || {}); } catch (e) { console.warn('fx failed', ev, e); }
    });
  }

  bind('fx:penalty', function (d) { doPenalty(d.amount); });
  bind('fx:moment',  function (d) { doMoment(d); });
  bind('fx:cash',    function () { doCash(); });
</script>
</body>
</html>
