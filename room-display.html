<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Speed Build — Room Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --red:#CC0000; --green:#00D97E; }
  html, body {
    margin:0; padding:0; background:#000; overflow:hidden;
    width:100vw; height:100vh; color:#fff;
    font-family:'Roboto Mono',ui-monospace,monospace;
    display:flex; align-items:center; justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .hide { display:none !important; }

  .tick { position:fixed; background:var(--red); z-index:4; }
  .tl-h{top:26px;left:26px;width:54px;height:3px} .tl-v{top:26px;left:26px;width:3px;height:54px}
  .tr-h{top:26px;right:26px;width:54px;height:3px} .tr-v{top:26px;right:26px;width:3px;height:54px}
  .bl-h{bottom:26px;left:26px;width:54px;height:3px} .bl-v{bottom:26px;left:26px;width:3px;height:54px}
  .br-h{bottom:26px;right:26px;width:54px;height:3px} .br-v{bottom:26px;right:26px;width:3px;height:54px}

  #scan {
    position:fixed; inset:0; z-index:3; pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.035) 0 1px, transparent 1px 4px);
    animation:flicker 5s steps(2) infinite;
  }
  @keyframes flicker { 0%,94%{opacity:1} 95%,97%{opacity:.85} 98%,100%{opacity:1} }

  #band {
    position:fixed; top:0; left:0; right:0; background:var(--red); padding:15px 0;
    text-align:center; font-size:29px; letter-spacing:.5em; font-weight:700;
    text-transform:uppercase; z-index:5; transform:translateY(-100%);
    transition:transform .45s cubic-bezier(.2,.8,.2,1);
  }
  #band.show { transform:translateY(0); }

  #stack { text-align:center; z-index:2; padding:0 80px; width:100%; }

  #room { font-size:58px; letter-spacing:.22em; font-weight:700; text-transform:uppercase; min-height:72px; }
  #room .k { color:var(--red); }

  #timer { font-size:268px; line-height:1; font-weight:700; font-variant-numeric:tabular-nums;
           text-shadow:0 0 100px rgba(204,0,0,.28); margin-top:10px; }
  #timer.warn { color:var(--red); animation:tick 1s steps(2) infinite; }

  #div { height:2px; background:#1E1E1E; margin:40px auto; width:56%; }

  #pot-lbl { font-size:30px; letter-spacing:.5em; color:rgba(255,255,255,.55); text-transform:uppercase; }
  #pot { font-size:124px; font-weight:700; margin-top:10px; font-variant-numeric:tabular-nums; }
  #pot .c { font-size:66px; opacity:.7; }
  #pot.hit { animation:potHit .8s ease-out; }

  /* no timer showing — the pot takes the room */
  body.no-timer #div { margin:22px auto; }
  body.no-timer #pot-lbl { font-size:44px; }
  body.no-timer #pot { font-size:206px; }
  body.no-timer #pot .c { font-size:110px; }

  #paused { margin-top:24px; }
  #paused .box { display:inline-block; background:var(--red); padding:12px 34px; }
  #paused .t { font-size:34px; font-weight:700; letter-spacing:.42em; text-transform:uppercase;
               animation:tick 1.4s steps(2) infinite; }

  #rem { position:fixed; bottom:68px; left:0; right:0; text-align:center; z-index:2;
         font-size:27px; letter-spacing:.35em; color:rgba(255,255,255,.55); text-transform:uppercase; }
  #rem b { color:var(--red); font-size:42px; letter-spacing:.05em; }

  #pen { position:fixed; bottom:196px; left:0; right:0; text-align:center; z-index:3;
         font-size:96px; font-weight:700; color:var(--red); opacity:0;
         font-variant-numeric:tabular-nums; pointer-events:none; }
  #pen.show { animation:penFloat 1.7s ease-out forwards; }

  #moment { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
            flex-direction:column; text-align:center; z-index:6; padding:0 70px; }
  #moment.on { display:flex; }
  #mo-bg { position:absolute; inset:0; }
  #mo-inner { position:relative; }
  #mo-kicker { font-size:38px; letter-spacing:.4em; text-transform:uppercase; font-weight:500; line-height:1.35; }
  #mo-name { font-size:86px; font-weight:700; margin-top:22px; line-height:1; }
  #moment.positive #mo-bg { background:var(--green); animation:slamBg .9s ease-out forwards; }
  #moment.positive #mo-kicker { color:#00301B; }
  #moment.positive #mo-name { color:#000; }
  #moment.positive #mo-inner { animation:slamIn .55s cubic-bezier(.15,1.3,.4,1) both, fadeOut .3s ease-in 1.5s forwards; }
  #moment.negative #mo-bg { background:var(--red); animation:elimBg 3.4s ease-out forwards; }
  #moment.negative #mo-kicker { color:rgba(255,255,255,.85); }
  #moment.negative #mo-name { color:#fff; }
  #moment.negative #mo-inner { animation:elimIn .5s cubic-bezier(.15,1.2,.4,1) both, fadeOut .45s ease-in 2.9s forwards; }

  #cash { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:4; }
  #cash-wash { position:absolute; inset:0; background:radial-gradient(ellipse at center, transparent 30%, rgba(0,217,126,.13) 75%, rgba(0,217,126,.33) 100%); opacity:0; }
  #cash-wash.on { animation:wash 2.2s ease-out forwards; }
  .bill { position:absolute; top:-120px; font-weight:700; }

  @keyframes potHit { 0%{color:var(--red);transform:scale(1.07)} 100%{color:#fff;transform:scale(1)} }
  @keyframes penFloat { 0%{opacity:0;transform:translateY(0)} 15%{opacity:1} 100%{opacity:0;transform:translateY(-9vh)} }
  @keyframes tick { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes slamBg { 0%{opacity:0} 4%{opacity:1} 72%{opacity:1} 100%{opacity:0} }
  @keyframes slamIn { 0%{transform:scale(2.4);opacity:0} 42%{opacity:1} 100%{transform:scale(1);opacity:1} }
  @keyframes elimBg { 0%{opacity:0} 5%{opacity:1} 82%{opacity:1} 100%{opacity:0} }
  @keyframes elimIn { 0%{transform:translateY(4vh);opacity:0} 100%{transform:translateY(0);opacity:1} }
  @keyframes fadeOut { to{opacity:0} }
  @keyframes wash { 0%{opacity:0} 12%{opacity:1} 100%{opacity:0} }
  @keyframes fallA { 0%{transform:translate(0,0) rotate(0);opacity:0} 8%{opacity:1} 88%{opacity:1} 100%{transform:translate(var(--drift),1300px) rotate(var(--spin));opacity:0} }
  @keyframes fallB { 0%{transform:translate(0,0) rotate(0) scale(.7);opacity:0} 10%{opacity:1} 85%{opacity:1} 100%{transform:translate(var(--drift),1300px) rotate(var(--spin)) scale(1.25);opacity:0} }
  @keyframes fallC { 0%{transform:translate(0,0) rotate(0);opacity:0} 6%{opacity:1} 90%{opacity:1} 100%{transform:translate(calc(var(--drift) * -1),1300px) rotate(var(--spin));opacity:0} }

  #status { position:fixed; bottom:12px; left:14px; font-size:10px; color:rgba(255,255,255,.18); letter-spacing:.14em; z-index:4; }
</style>
</head>
<body class="no-timer">

  <div class="tick tl-h"></div><div class="tick tl-v"></div>
  <div class="tick tr-h"></div><div class="tick tr-v"></div>
  <div class="tick bl-h"></div><div class="tick bl-v"></div>
  <div class="tick br-h"></div><div class="tick br-v"></div>
  <div id="scan"></div>

  <div id="band">Transmission received</div>

  <div id="stack">
    <div id="room"><span class="k">ROOM = </span><span id="room-val"></span></div>
    <div id="timer" class="hide">--:--</div>
    <div id="div"></div>
    <div id="pot-block">
      <div id="pot-lbl">Prize pot</div>
      <div id="pot">$--,---</div>
    </div>
    <div id="paused" class="hide"><div class="box"><div class="t">Clock paused</div></div></div>
  </div>

  <div id="rem" class="hide"><b id="rem-num">--</b>&nbsp; Remaining</div>
  <div id="pen"></div>

  <div id="moment"><div id="mo-bg"></div><div id="mo-inner"><div id="mo-kicker"></div><div id="mo-name"></div></div></div>

  <div id="cash"><div id="cash-wash"></div></div>
  <div id="status">connecting</div>

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<script>
  /* ============ CONFIG — must match control ============ */
  var ABLY_API_KEY = 'tBw4fw.80_qjg:lyIY2luq1ef0IESrQLekGmz7FJgbSCp0gcLtpfDqcS8';
  var CHANNEL_NAME = 'speedbuild-v4';
  var SURFACE = 'tv';
  /* ==================================================== */

  var $ = function (id) { return document.getElementById(id); };
  var ably = new Ably.Realtime(ABLY_API_KEY);
  var channel = ably.channels.get(CHANNEL_NAME, { params: { rewind: '10' } });

  ably.connection.on('connected', function () { $('status').textContent = 'live · room display'; });
  ably.connection.on('disconnected', function () { $('status').textContent = 'reconnecting'; });

  var S = null, tickTimer = null;

  /* Anything missing defaults to visible, so a partial state message can
     never blank a room screen mid-show. */
  function on(key) {
    if (!S || !S.vis) return true;
    var v = S.vis[key];
    if (!v) return true;
    return v[SURFACE] !== false;
  }

  function money(v) {
    var n = Math.max(0, v), w = Math.floor(n), c = Math.floor((n - w) * 100);
    return { main: '$' + w.toLocaleString('en-US'), cents: '.' + String(c).padStart(2, '0') };
  }
  function fmtTime(ms) {
    var t = Math.floor(Math.max(0, ms) / 1000);
    return String(Math.floor(t / 60)).padStart(2, '0') + ':' + String(t % 60).padStart(2, '0');
  }
  function currentPot() {
    if (!S) return 0;
    if (!S.potRunning) return S.potBase;
    return S.potBase - ((Date.now() - S.potBaseTime) / 60000) * S.potRatePerMin;
  }
  function show(el, yes) { el.classList.toggle('hide', !yes); }

  function render() {
    if (!S) return;

    show($('room'), on('room'));
    $('room-val').textContent = S.roomName || '';

    var showTimer = on('timer') && S.roundEndTime !== null && S.roundEndTime !== undefined;
    show($('timer'), showTimer);
    document.body.classList.toggle('no-timer', !showTimer);
    if (showTimer) {
      var rem = S.roundEndTime - Date.now();
      $('timer').textContent = fmtTime(rem);
      $('timer').classList.toggle('warn', rem < 5 * 60 * 1000);
    }

    var showPot = on('pot');
    show($('pot-block'), showPot);
    if (showPot) {
      var m = money(currentPot());
      $('pot').innerHTML = m.main + '<span class="c">' + m.cents + '</span>';
    }

    show($('paused'), on('paused') && !S.potRunning);
    show($('div'), on('room') || showTimer || showPot);

    var hasRem = on('remaining') && S.remaining !== null && S.remaining !== undefined;
    show($('rem'), hasRem);
    if (hasRem) $('rem-num').textContent = S.remaining;

    /* The band only ever says something arrived. Printing the task here
       would hand the room the answer. */
    $('band').classList.toggle('show', !!(on('secret') && S.secret && S.secret.task));
  }

  function startLoop() {
    if (tickTimer) clearInterval(tickTimer);
    tickTimer = setInterval(render, 100);
  }

  function retrigger(el, cls) { el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls); }

  function doPenalty(amount) {
    if (!on('penalty')) return;
    if (on('pot')) retrigger($('pot'), 'hit');
    $('pen').textContent = '\u2212$' + Number(amount || 0).toLocaleString('en-US');
    retrigger($('pen'), 'show');
  }

  var momentTimer = null;
  function doMoment(d) {
    if (!on('moments')) return;
    clearTimeout(momentTimer);
    var el = $('moment');
    el.className = '';
    void el.offsetWidth;
    $('mo-kicker').textContent = d.kicker || '';
    var nameEl = $('mo-name');
    nameEl.textContent = (d.name || '').toUpperCase();
    nameEl.style.display = d.name ? 'block' : 'none';
    var tone = d.tone === 'negative' ? 'negative' : 'positive';
    el.classList.add('on', tone);
    momentTimer = setTimeout(function () { el.className = ''; }, tone === 'positive' ? 2000 : 3500);
  }

  function doCash() {
    if (!on('cash')) return;
    var layer = $('cash');
    retrigger($('cash-wash'), 'on');
    var syms = ['$', '\u00A3', '\u20AC', '$', '$'];
    for (var i = 0; i < 90; i++) {
      var b = document.createElement('div');
      b.className = 'bill';
      b.textContent = syms[i % 5];
      b.style.left = (Math.random() * 104 - 2) + '%';
      b.style.fontSize = (30 + Math.random() * 76) + 'px';
      b.style.color = (i % 4 !== 0) ? 'var(--green)' : '#fff';
      b.style.setProperty('--spin', ((Math.random() < 0.5 ? -1 : 1) * (360 + Math.random() * 900)) + 'deg');
      b.style.setProperty('--drift', ((Math.random() - 0.5) * 340) + 'px');
      var anim = i % 3 === 0 ? 'fallA' : (i % 3 === 1 ? 'fallB' : 'fallC');
      b.style.animation = anim + ' ' + (2.1 + Math.random() * 1.8) + 's cubic-bezier(.35,.05,.6,1) ' + (Math.random() * 1.1) + 's forwards';
      layer.appendChild(b);
      (function (node) { setTimeout(function () { node.remove(); }, 5200); })(b);
    }
  }

  channel.subscribe('state', function (msg) {
    try {
      var d = msg.data;
      if (!d) return;
      /* REVISION GUARD — if a second control panel is holding older state
         and heartbeats it, ignore it. Without this, a stale panel can roll
         the pot, the count and the room name backwards mid-broadcast. */
      if (S && typeof d.rev === 'number' && typeof S.rev === 'number' && d.rev < S.rev) return;
      S = d; render(); startLoop();
    }
    catch (e) { console.warn('state render failed', e); }
  });

  function isLive(msg) { return (Date.now() - msg.timestamp) < 3000; }
  function bind(ev, fn) {
    channel.subscribe(ev, function (m) {
      if (!isLive(m)) return;
      try { fn(m.data || {}); } catch (e) { console.warn('fx failed', ev, e); }
    });
  }

  bind('fx:penalty', function (d) { doPenalty(d.amount); });
  bind('fx:moment',  function (d) { doMoment(d); });
  bind('fx:cash',    function () { doCash(); });

  /* No audio on room screens by design. An unmanaged TV speaker firing
     stings would fight the PA and bleed into the boom mics. */
</script>
</body>
</html>
